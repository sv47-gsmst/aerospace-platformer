<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Cadet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top, #0b0f2a, #000000);
            font-family: 'Press Start 2P', cursive;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .game-wrapper {
            text-align: center;
            position: relative;
        }

        .title {
            margin-bottom: 20px;
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #1e90ff;
        }

        #menu-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid #1e90ff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(30, 144, 255, 0.5);
        }

        #menu-container button {
            padding: 15px 20px;
            font-size: 14px;
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            background-color: #1e90ff;
            color: #0b0f2a;
            border: none;
            border-radius: 4px;
            transition: 0.2s;
        }

        #menu-container button:hover {
            background-color: #00f2fe;
            box-shadow: 0 0 15px #00f2fe;
        }

        #game-container {
            position: relative;
            width: 900px;
            height: 600px;
            border: 2px solid #1e90ff;
            box-shadow: 0 0 20px rgba(30, 144, 255, 0.5);
            border-radius: 8px;
            overflow: hidden;
            display: none;
            background: linear-gradient(to bottom, #0b0f2a 0%, #1a1a3a 100%);
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 870px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            font-size: 14px;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            text-shadow: 3px 3px 0 #000;
            display: none;
            text-align: center;
            line-height: 1.5;
            color: #00f2fe;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border: 2px solid #1e90ff;
            border-radius: 8px;
            cursor: pointer;
        }

        .controls {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <h1 class="title">🚀 Orbital Cadet</h1>
        
        <div id="menu-container">
            <button id="infinite-btn">Infinite Mode</button>
            <button id="levels-btn">Levels Mode</button>
        </div>

        <div id="game-container">
            <div id="ui">
                <span id="scoreDisplay">Score: 0</span>
                <span id="modeDisplay">Level: 1</span>
            </div>
            <div id="message"></div>
            <canvas id="gameCanvas" width="900" height="600"></canvas>
        </div>

        <p class="controls" id="controls">A/D or Arrows to Move • W/Up/Space to Jump</p>
    </div>

    <script>
        // DOM Elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreUI = document.getElementById('scoreDisplay');
        const modeUI = document.getElementById('modeDisplay');
        const msgUI = document.getElementById('message');
        const menuContainer = document.getElementById('menu-container');
        const gameContainer = document.getElementById('game-container');

        // Physics & Core Variables
        const gravity = 0.6, friction = 0.85;
        let player, camera, platforms, enemies, stars, coins, flags;
        let score = 0, currentLevel = 1, maxLevels = 15;
        let distance = 0;
        let spawnPoint = { x: 50, y: 300 }; 
        let gameState = 'menu'; // menu, playing, transition, won, gameover
        let gameMode = 'levels'; // levels, infinite
        let infiniteLastX = 0;
        let animationId;

        // Input Handling
        const keys = { left: false, right: false, up: false };
        window.addEventListener('keydown', e => { 
            if (e.code==='KeyA'||e.code==='ArrowLeft') keys.left=true; 
            if (e.code==='KeyD'||e.code==='ArrowRight') keys.right=true; 
            if (e.code==='KeyW'||e.code==='ArrowUp'||e.code==='Space') keys.up=true; 
        });
        window.addEventListener('keyup', e => { 
            if (e.code==='KeyA'||e.code==='ArrowLeft') keys.left=false; 
            if (e.code==='KeyD'||e.code==='ArrowRight') keys.right=false; 
            if (e.code==='KeyW'||e.code==='ArrowUp'||e.code==='Space') keys.up=false; 
        });

        // Menu Buttons
        document.getElementById('infinite-btn').onclick = () => startGame('infinite');
        document.getElementById('levels-btn').onclick = () => startGame('levels');

        msgUI.onclick = () => {
            if (gameState === 'gameover' || gameState === 'won') {
                returnToMenu();
            }
        };

        function startGame(mode) {
            gameMode = mode;
            score = 0;
            currentLevel = 1;
            distance = 0;
            
            menuContainer.style.display = 'none';
            gameContainer.style.display = 'block';
            msgUI.style.display = 'none';
            
            if (gameMode === 'infinite') {
                modeUI.innerText = `Distance: 0m`;
                buildInfiniteStart();
            } else {
                modeUI.innerText = `Level: ${currentLevel}`;
                buildLevel(currentLevel);
            }
            
            gameState = 'playing';
            if (!animationId) loop();
        }

        function returnToMenu() {
            gameState = 'menu';
            cancelAnimationFrame(animationId);
            animationId = null;
            menuContainer.style.display = 'flex';
            gameContainer.style.display = 'none';
            msgUI.style.display = 'none';
        }

        function createStars() {
            stars = [];
            for(let i=0; i<100; i++) { 
                // Spread stars out far for parallax
                stars.push({
                    x: Math.random() * 10000, 
                    y: Math.random() * canvas.height, 
                    size: Math.random() * 2 + 1,
                    alpha: Math.random() * 0.5 + 0.1
                }); 
            }
        }

        // --- LEVEL MODE LOGIC ---
        function buildLevel(levelNum) {
            platforms = []; enemies = []; coins = []; flags = [];
            spawnPoint = { x: 50, y: 300 };
            createStars();
            
            let numPlatforms = 20 + (levelNum * 2);
            let maxGap = 80 + (levelNum * 4); 
            let minPlatWidth = Math.max(40, 120 - (levelNum * 5)); 
            let enemyChance = Math.min(0.8, 0.2 + (levelNum * 0.04)); 

            let lastX = 0; let lastY = 400;
            for(let i=0; i<numPlatforms; i++) {
                let pWidth = Math.random() * 100 + minPlatWidth;
                let gapX = Math.random() * maxGap + 50; 
                let pX = (i===0) ? 20 : lastX + gapX;
                let pY = (i===0) ? 400 : lastY + ((Math.random() * 180) - 90);
                if (pY > 550) pY = 550; if (pY < 200) pY = 200;

                platforms.push({x: pX, y: pY, width: pWidth, height: 20});
                
                // Checkpoint
                if (i === Math.floor(numPlatforms / 2)) {
                    flags.push({x: pX + pWidth/2, y: pY - 60, w: 20, h: 60, type: 'checkpoint', active: true, color: '#00FF00'});
                }
                
                // End Portal/Flag
                if (i === numPlatforms - 1) {
                    flags.push({x: pX + pWidth/2, y: pY - 80, w: 40, h: 80, type: 'end', active: true, color: '#FF00FF'});
                }

                // Coins (Space Crystals)
                if (i > 0 && i !== numPlatforms - 1 && Math.random() > 0.3) {
                    coins.push({x: pX + (pWidth/2) - 10, y: pY - 30, w: 15, h: 15, collected: false});
                }

                // Enemies (Aliens)
                if (i > 0 && i !== Math.floor(numPlatforms/2) && Math.random() < enemyChance && pWidth > 80) {
                    enemies.push({x: pX + pWidth/2, y: pY - 30, width: 30, height: 30, speed: 1 + (levelNum*0.1), dir: 1, minX: pX, maxX: pX + pWidth - 30, active: true});
                }
                lastX = pX + pWidth; lastY = pY;
            }
            scoreUI.innerText = `Score: ${score}`;
            resetPlayer();
        }

        // --- INFINITE MODE LOGIC ---
        function buildInfiniteStart() {
            platforms = []; enemies = []; coins = []; flags = [];
            spawnPoint = { x: 50, y: 300 };
            createStars();
            
            platforms.push({x: 20, y: 400, width: 200, height: 20});
            infiniteLastX = 220;
            
            // Initial chunk
            for(let i=0; i<10; i++) {
                addInfinitePlatform();
            }
            scoreUI.innerText = `Score: 0`;
            resetPlayer();
        }

        function addInfinitePlatform() {
            let pWidth = Math.random() * 100 + 60;
            let gapX = Math.random() * 150 + 50; 
            let pX = infiniteLastX + gapX;
            
            // Determine Y based on previous platform to ensure it's jumpable
            let lastPlat = platforms[platforms.length-1];
            let lastY = lastPlat ? lastPlat.y : 400;
            let pY = lastY + ((Math.random() * 180) - 90);
            
            if (pY > 550) pY = 550; 
            if (pY < 200) pY = 200;

            platforms.push({x: pX, y: pY, width: pWidth, height: 20});
            
            if (Math.random() > 0.4) {
                coins.push({x: pX + (pWidth/2) - 10, y: pY - 30, w: 15, h: 15, collected: false});
            }

            if (Math.random() > 0.6 && pWidth > 80) {
                enemies.push({x: pX + pWidth/2, y: pY - 30, width: 30, height: 30, speed: 1.5 + (distance/2000), dir: 1, minX: pX, maxX: pX + pWidth - 30, active: true});
            }

            infiniteLastX = pX + pWidth;
        }

        function cleanupInfinite() {
            let cleanupThreshold = camera.x - 500;
            platforms = platforms.filter(p => p.x + p.width > cleanupThreshold);
            coins = coins.filter(c => c.x + c.w > cleanupThreshold);
            enemies = enemies.filter(e => e.x + e.width > cleanupThreshold);
        }

        // --- PLAYER LOGIC ---
        function resetPlayer() {
            player = { x: spawnPoint.x, y: spawnPoint.y - 50, width: 30, height: 40, dx: 0, dy: 0, speed: 1.5, jumpForce: 13, grounded: false };
            camera = { x: Math.max(0, player.x - 300), smoothing: 0.1 }; 
            enemies.forEach(e => e.active = true);
        }

        function nextLevel() {
            currentLevel++;
            if (currentLevel > maxLevels) {
                gameState = 'won';
                msgUI.innerHTML = `MISSION ACCOMPLISHED!<br><br>Final Score: ${score}<br><br><span style="font-size:12px;">Click to return to menu</span>`;
                msgUI.style.display = 'block';
            } else {
                gameState = 'transition';
                msgUI.innerHTML = `ORBIT REACHED<br><br>Warping to Level ${currentLevel}...`;
                msgUI.style.display = 'block';
                modeUI.innerText = `Level: ${currentLevel}`;
                setTimeout(() => {
                    if(gameState === 'transition') {
                        msgUI.style.display = 'none';
                        buildLevel(currentLevel);
                        gameState = 'playing';
                    }
                }, 1500);
            }
        }

        function gameOver() {
            gameState = 'gameover';
            msgUI.innerHTML = `LOST IN SPACE<br><br>Score: ${score}<br>Distance: ${distance}m<br><br><span style="font-size:12px;">Click to return to menu</span>`;
            msgUI.style.display = 'block';
        }

        // --- MAIN LOOP ---
        function loop() {
            if (gameState === 'playing') {
                // Horizontal movement
                if (keys.left) player.dx -= player.speed; 
                if (keys.right) player.dx += player.speed;
                player.dx *= friction;

                // Jumping
                if (keys.up && player.grounded) { 
                    player.dy = -player.jumpForce; 
                    player.grounded = false; 
                }
                
                // Apply physics
                player.dy += gravity; 
                player.x += player.dx; 
                player.y += player.dy; 
                player.grounded = false;
                
                // Death by falling (Lava/Void)
                if (player.y > canvas.height + 50) { 
                    if (gameMode === 'infinite') {
                        gameOver();
                    } else {
                        resetPlayer(); 
                    }
                }

                // Camera follow
                let targetCamX = player.x - 300; 
                if (targetCamX < 0 && gameMode === 'levels') targetCamX = 0; // Prevent looking backwards in levels
                camera.x += (targetCamX - camera.x) * camera.smoothing;

                // Infinite Mode Generation & Tracking
                if (gameMode === 'infinite') {
                    if (player.x > distance) {
                        distance = Math.floor(player.x / 10);
                        modeUI.innerText = `Distance: ${distance}m`;
                    }
                    if (camera.x + 1200 > infiniteLastX) {
                        addInfinitePlatform();
                        cleanupInfinite();
                    }
                }

                // Platform Collision
                platforms.forEach(p => {
                    if (player.x < p.x + p.width && player.x + player.width > p.x && player.y < p.y + p.height && player.y + player.height > p.y) {
                        // Top collision
                        if (player.dy >= 0 && (player.y - player.dy + player.height) <= p.y + 15) { 
                            player.y = p.y - player.height; player.dy = 0; player.grounded = true; 
                        }
                    }
                });

                // Coins (Crystals)
                coins.forEach(c => {
                    if (!c.collected && player.x < c.x + c.w && player.x + player.width > c.x && player.y < c.y + c.h && player.y + player.height > c.y) {
                        c.collected = true; score += 10; scoreUI.innerText = `Score: ${score}`;
                    }
                });

                // Flags (Portals/Checkpoints)
                flags.forEach(f => {
                    if (f.active && player.x < f.x + f.w && player.x + player.width > f.x && player.y < f.y + f.h && player.y + player.height > f.y) {
                        if (f.type === 'checkpoint') { 
                            spawnPoint = { x: f.x, y: f.y + f.h }; 
                            f.color = '#00FA9A'; 
                            f.active = false; 
                        } else if (f.type === 'end') { 
                            nextLevel(); 
                        }
                    }
                });

                // Enemies
                enemies.forEach(e => {
                    if (!e.active) return;
                    e.x += e.speed * e.dir; 
                    if (e.x <= e.minX || e.x >= e.maxX) e.dir *= -1; 

                    if (player.x < e.x + e.width && player.x + player.width > e.x && player.y < e.y + e.height && player.y + player.height > e.y) {
                        // Kill enemy (jump on head)
                        if (player.dy > 0 && (player.y + player.height - player.dy) <= e.y + 15) {
                            e.active = false; player.dy = -10; score += 50; scoreUI.innerText = `Score: ${score}`;
                        } else { 
                            // Player takes damage
                            if (gameMode === 'infinite') {
                                gameOver();
                            } else {
                                resetPlayer(); 
                            }
                        }
                    }
                });
            }

            // --- DRAWING ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Stars (Parallax)
            ctx.save(); 
            ctx.translate(-camera.x * 0.1, 0);
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });
            ctx.restore();

            ctx.save(); 
            ctx.translate(-camera.x, 0);
            
            // Draw Platforms (Neon Tech style)
            platforms.forEach(p => {
                ctx.fillStyle = 'rgba(30, 144, 255, 0.2)'; // semi-transparent base
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.fillStyle = '#1e90ff'; // glowing top edge
                ctx.fillRect(p.x, p.y, p.width, 4);
                ctx.strokeStyle = '#00f2fe'; // borders
                ctx.lineWidth = 1;
                ctx.strokeRect(p.x, p.y, p.width, p.height);
            });
            
            // Draw Coins (Crystals)
            ctx.fillStyle = '#00f2fe'; 
            coins.forEach(c => { 
                if (!c.collected) { 
                    ctx.beginPath(); 
                    ctx.moveTo(c.x + c.w/2, c.y);
                    ctx.lineTo(c.x + c.w, c.y + c.h/2);
                    ctx.lineTo(c.x + c.w/2, c.y + c.h);
                    ctx.lineTo(c.x, c.y + c.h/2);
                    ctx.fill(); 
                }
            });
            
            // Draw Flags/Portals
            flags.forEach(f => {
                if(f.type === 'end') {
                    // Portal look
                    ctx.fillStyle = f.color; 
                    ctx.beginPath();
                    ctx.ellipse(f.x + f.w/2, f.y + f.h/2, f.w/2, f.h/2, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.beginPath();
                    ctx.ellipse(f.x + f.w/2, f.y + f.h/2, f.w/4, f.h/4, 0, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    // Antenna checkpoint
                    ctx.fillStyle = '#555'; ctx.fillRect(f.x, f.y, 4, f.h); 
                    ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(f.x + 2, f.y, 6, 0, Math.PI*2); ctx.fill();
                }
            });

            // Draw Enemies (Red Aliens)
            ctx.fillStyle = '#ff4500'; 
            enemies.forEach(e => { 
                if(e.active) {
                    ctx.fillRect(e.x, e.y, e.width, e.height); 
                    // Alien Eye
                    ctx.fillStyle = 'yellow';
                    let eyeX = e.dir === 1 ? e.x + 18 : e.x + 4;
                    ctx.fillRect(eyeX, e.y + 5, 8, 8);
                    ctx.fillStyle = '#ff4500'; // reset for next
                }
            });

            // Draw Player (Astronaut Proxy)
            ctx.fillStyle = '#ffffff'; // white suit
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#00f2fe'; // visor
            let visorX = player.dx >= 0 ? player.x + 12 : player.x + 2;
            ctx.fillRect(visorX, player.y + 6, 16, 10);
            
            // Lava/Void Floor Effect
            ctx.fillStyle = 'rgba(255, 69, 0, 0.4)';
            ctx.fillRect(camera.x, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = '#ff4500';
            ctx.fillRect(camera.x, canvas.height - 5, canvas.width, 5);

            ctx.restore();
            
            if (gameState !== 'menu') {
                animationId = requestAnimationFrame(loop);
            }
        }
    </script>
</body>
</html>
